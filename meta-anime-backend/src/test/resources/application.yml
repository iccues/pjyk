spring:
  profiles:
    active: test

  datasource:
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true
    show-sql: false

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: https://test.example.com


mal:
  client-id: test-client-id

oidc:
  issuer: https://test.example.com
  client-id: test-client-id

platform:
  bangumi:
    popularity-multiplier: 100.0
    score-weight: 2
    score-mean: 6.0
    score-std: 1.0
  anilist:
    popularity-multiplier: 10.0
    score-weight: 1
    score-mean: 70.0
    score-std: 10.0
  myanimelist:
    popularity-multiplier: 1.0
    score-weight: 1
    score-mean: 7.0
    score-std: 1.0
