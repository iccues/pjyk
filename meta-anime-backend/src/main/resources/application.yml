spring:
  application:
    name: meta-anime-backend

  datasource:
    url: jdbc:postgresql://localhost:5432/meta-anime
    username: jim
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${oidc.issuer}

mal:
  client-id: ${MAL_CLIENT_ID}

oidc:
  issuer: ${OIDC_ISSUER}
  client-id: ${OIDC_CLIENT_ID}

logging:
  level:
    root: INFO
    com.iccues.metaanimebackend: DEBUG

platform:
  bangumi:
    popularity-multiplier: 166.7
    score-weight: 2
  anilist:
    popularity-multiplier: 11.1
    score-weight: 1
  myanimelist:
    popularity-multiplier: 1.0
    score-weight: 1
