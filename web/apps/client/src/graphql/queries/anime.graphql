query GetAnimeListRow(
  $year: Int
  $season: Season
  $pageNumber: Int
  $pageSize: Int
  $sortBy: SortBy
) {
  animeList(
    year: $year
    season: $season
    pageNumber: $pageNumber
    pageSize: $pageSize
    sortBy: $sortBy
  ) {
    content {
      animeId
      ...AnimeCard
    }
  }
}

query GetAnimeList($year: Int, $season: Season, $pageNumber: Int, $pageSize: Int, $sortBy: SortBy) {
  animeList(
    year: $year
    season: $season
    pageNumber: $pageNumber
    pageSize: $pageSize
    sortBy: $sortBy
  ) {
    ...AnimeList
  }
}

query GetAnimeListBySearch($query: String, $pageNumber: Int, $pageSize: Int) {
  animeListBySearch(query: $query, pageNumber: $pageNumber, pageSize: $pageSize) {
    ...AnimeList
  }
}

fragment AnimeList on AnimePage {
  content {
    animeId
    ...AnimeCard
  }
  pageInfo {
    size
    number
    totalElements
    totalPages
  }
}

fragment AnimeCard on Anime {
  animeId
  title {
    titleNative
    titleCn
  }
  coverImage
  averageScore
}

query GetAnimeDetail($animeId: ID!) {
  anime(animeId: $animeId) {
    animeId
    coverImage
    startDate
    averageScore
    popularity
    title {
      titleNative
      titleRomaji
      titleEn
      titleCn
    }
    mappings {
      mappingId
      ...MappingItem
    }
  }
}

fragment MappingItem on Mapping {
  sourcePlatform
  platformId
  rawScore
  normalizedScore
  rawPopularity
  normalizedPopularity
}
